<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Buttons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="buttons-container">

    <div class="buttons-grid">
        <button class="btn btn-gray">Просмотреть</button>
        <button class="btn btn-outline-red">Просмотреть</button>
        <button class="btn btn-red">Просмотреть</button>
        <button class="btn btn-gray btn-arrow">Просмотреть</button>
        <button class="btn btn-green">Просмотреть</button>
        <button class="btn btn-outline-green">Просмотреть</button>

        <button class="btn btn-gray hover">Просмотреть</button>
        <button class="btn btn-outline-red hover">Просмотреть</button>
        <button class="btn btn-red hover">Просмотреть</button>
        <button class="btn btn-gray btn-arrow hover">Просмотреть</button>
        <button class="btn btn-green hover">Просмотреть</button>
        <button class="btn btn-outline-green hover">Просмотреть</button>

        <button class="btn btn-gray active">Просмотреть</button>
        <button class="btn btn-outline-red active">Просмотреть</button>
        <button class="btn btn-red active">Просмотреть</button>
        <button class="btn btn-gray btn-arrow active">Просмотреть</button>
        <button class="btn btn-green active">Просмотреть</button>
        <button class="btn btn-outline-green active">Просмотреть</button>

        <button class="btn btn-gray" disabled>Просмотреть</button>
        <button class="btn btn-outline-red" disabled>Просмотреть</button>
        <button class="btn btn-red" disabled>Просмотреть</button>
        <button class="btn btn-gray btn-arrow" disabled>Просмотреть</button>
        <button class="btn btn-green" disabled>Просмотреть</button>
        <button class="btn btn-outline-green" disabled>Просмотреть</button>
    </div>

    <hr class="divider">

    <div class="buttons-row">
        <button class="btn btn-action">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            Редактировать
        </button>

        <button class="btn btn-action">
            <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm0-10h4v6h6v-6h4l-7-7-7 7z"/></svg>
            Выгрузить в Excel
        </button>

        <button class="btn btn-action">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            Удалить список
        </button>

        <button class="btn btn-action">
            <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
            Распечатать
        </button>

        <button class="btn btn-action">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            Загрузить из файла
        </button>
    </div>

</div>

</body>
</html>
